<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTO Allocation — Global</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f2;--surface:#fff;--s2:#f0efed;--border:#e2e0dd;--text:#1a1917;--muted:#8a8784;--orange:#e8601c;--green:#2d7a4f;--red:#c0392b;--grey:#c8c7c5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--text);color:var(--bg);padding:26px 44px;display:flex;align-items:center;justify-content:space-between}
.logo{font:11px/1 'DM Mono',monospace;letter-spacing:.14em;text-transform:uppercase;opacity:.38}
header h1{font-size:20px;font-weight:600;letter-spacing:-.02em}
.hmeta{font:11px/1.7 'DM Mono',monospace;opacity:.35;text-align:right}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 44px;display:flex;align-items:center;justify-content:space-between;height:54px}
.nav-l{display:flex;align-items:center;gap:8px}
.btn{font:500 13px/1 'Syne',sans-serif;border:1px solid var(--border);background:transparent;color:var(--text);padding:7px 15px;cursor:pointer;transition:.13s}
.btn:hover{background:var(--s2)}
.btn-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;padding:0;font-size:15px}
.btn-primary{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:600}
.btn-primary:hover{background:#c94d0e;border-color:#c94d0e}
.mlabel{font-size:17px;font-weight:600;letter-spacing:-.02em;min-width:175px;text-align:center}
.legend{display:flex;align-items:center;gap:16px;font:11px/1 'DM Mono',monospace;color:var(--muted)}
.li{display:flex;align-items:center;gap:6px}
.ld{width:9px;height:9px;border-radius:50%}
main{padding:34px 44px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:26px}
.sc{background:var(--surface);padding:20px 24px}
.sl{font:10px/1 'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.sv{font-size:30px;font-weight:700;letter-spacing:-.04em;line-height:1}
.sv span{font-size:14px;font-weight:400;opacity:.5}
.sv.o{color:var(--orange)}.sv.g{color:var(--green)}.sv.r{color:var(--red)}
.ss{font:10px/1 'DM Mono',monospace;color:var(--muted);margin-top:5px}
.cal{border:1px solid var(--border);background:var(--surface);overflow:hidden}
.dh{display:grid;grid-template-columns:128px repeat(7,1fr);border-bottom:2px solid var(--border);background:var(--s2)}
.dhc{padding:11px 13px;font:10px/1 'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--border);text-align:center}
.dhc:first-child{text-align:left}.dhc:last-child{border-right:none}
.wr{display:grid;grid-template-columns:128px repeat(7,1fr);border-bottom:1px solid var(--border);min-height:90px;position:relative}
.wr:last-child{border-bottom:none}
.wstripe{position:absolute;top:0;left:0;width:3px;bottom:0}
.wl{padding:12px 12px 12px 18px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:space-between}
.wn{font:10px/1 'DM Mono',monospace;color:var(--muted);letter-spacing:.07em}
.wh{font:500 14px/1 'DM Mono',monospace}
.wh span{font-size:10px;opacity:.5}
.ws2{font:9px/1 'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.wbw{height:2px;background:var(--border);border-radius:1px;margin-top:7px;overflow:hidden}
.wbf{height:100%;border-radius:1px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.dc{border-right:1px solid var(--border);padding:9px 9px;cursor:pointer;transition:background .12s;min-height:90px;display:flex;flex-direction:column;gap:2px}
.dc:last-child{border-right:none}
.dc:hover:not(.grey){background:#faf9f7}
.dn{font-size:12px;font-weight:600;line-height:1;margin-bottom:2px}
.om .dn{color:var(--muted);opacity:.28}
.td .dn{background:var(--orange);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.dh2{font:10px/1 'DM Mono',monospace;color:var(--muted)}
.chip{font:10px/1 'DM Mono',monospace;padding:2px 6px;border-radius:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid transparent;max-width:100%;transition:opacity .12s}
.chip:hover{opacity:.65}
.grey{background:repeating-linear-gradient(-45deg,#f0efed,#f0efed 3px,#e8e7e5 3px,#e8e7e5 9px)!important;cursor:not-allowed;opacity:.5;pointer-events:none}
.overlay{display:none;position:fixed;inset:0;background:rgba(26,25,23,.55);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);width:440px;max-width:95vw;animation:up .18s ease;box-shadow:0 20px 60px rgba(0,0,0,.13)}
@keyframes up{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{background:var(--text);color:var(--bg);padding:17px 21px;display:flex;justify-content:space-between;align-items:center}
.mh span{font-size:14px;font-weight:600}
.mx{background:none;border:none;color:var(--bg);cursor:pointer;font-size:20px;opacity:.4;line-height:1;transition:opacity .12s}
.mx:hover{opacity:1}
.mb{padding:21px}
.mf{padding:13px 21px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.fg{margin-bottom:15px}
.fl{display:block;font:10px/1 'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.fi,.fs{width:100%;font:13px/1 'Syne',sans-serif;border:1px solid var(--border);background:var(--bg);color:var(--text);padding:9px 11px;outline:none;transition:border-color .13s;-webkit-appearance:none}
.fi:focus,.fs:focus{border-color:var(--orange)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.warn{font:11px/1.5 'DM Mono',monospace;padding:9px 12px;margin-bottom:13px;border-left:3px solid var(--orange);background:rgba(232,96,28,.07);color:var(--orange)}
.warn.d{border-color:var(--red);background:rgba(192,57,43,.07);color:var(--red)}
.ctx{display:none;position:fixed;z-index:200;background:var(--surface);border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.1);min-width:152px}
.ctx.open{display:block}
.ci{padding:10px 15px;font:12px/1 'DM Mono',monospace;cursor:pointer;transition:background .1s}
.ci:hover{background:var(--s2)}
.ci.del{color:var(--red)}
@media(max-width:900px){header,nav,main{padding-left:16px;padding-right:16px}.stats{grid-template-columns:1fr 1fr}.legend{display:none}.dh,.wr{grid-template-columns:78px repeat(7,1fr)}.wl{padding:8px 8px 8px 11px}.dc{padding:6px 5px}}
</style>
</head>
<body>
<header>
  <div class="logo">PTO / Global</div>
  <h1>Global PTO Allocation</h1>
  <div class="hmeta" id="hm">—</div>
</header>
<nav>
  <div class="nav-l">
    <button class="btn btn-icon" id="pb">&#8592;</button>
    <div class="mlabel" id="ml">—</div>
    <button class="btn btn-icon" id="nb">&#8594;</button>
    <button class="btn" id="tb">Today</button>
  </div>
  <div class="legend">
    <div class="li"><div class="ld" style="background:var(--green)"></div>&lt;800h — Available</div>
    <div class="li"><div class="ld" style="background:var(--orange)"></div>800–1100h — Getting Full</div>
    <div class="li"><div class="ld" style="background:var(--red)"></div>&gt;1100h — Few Hours Left</div>
    <div class="li"><div class="ld" style="background:var(--grey)"></div>1200h — Limit Reached</div>
  </div>
</nav>
<main>
  <div class="stats" id="st"></div>
  <div class="cal">
    <div class="dh" id="dh"></div>
    <div id="cb"></div>
  </div>
</main>
<div class="overlay" id="ov">
  <div class="modal">
    <div class="mh"><span>Add PTO Entry</span><button class="mx" id="mc">&times;</button></div>
    <div class="mb">
      <div id="wb" class="warn" style="display:none"></div>
      <div class="fg"><label class="fl">Employee Name</label><input class="fi" id="fn" type="text" placeholder="e.g. Sarah Johnson"></div>
      <div class="fr">
        <div class="fg"><label class="fl">Start Date</label><input class="fi" id="fsd" type="date"></div>
        <div class="fg"><label class="fl">End Date</label><input class="fi" id="fed" type="date"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="fl">Hours / Day</label><input class="fi" id="fhd" type="number" value="8" min="1" max="24" step="0.5"></div>
        <div class="fg"><label class="fl">Region</label>
          <select class="fs" id="frd"><option>AMER</option><option>EMEA</option><option>APAC</option><option>LATAM</option><option>Global</option></select>
        </div>
      </div>
    </div>
    <div class="mf"><button class="btn" id="mca">Cancel</button><button class="btn btn-primary" id="msv">Add Entry</button></div>
  </div>
</div>
<div class="ctx" id="ctx">
  <div class="ci" id="ca">+ Add PTO Here</div>
  <div class="ci del" id="cd" style="display:none">Remove Entry</div>
</div>
<script>
const LIM=1200,DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'],
RC={AMER:{bg:'rgba(232,96,28,.10)',t:'#b84d0e',b:'rgba(232,96,28,.28)'},EMEA:{bg:'rgba(45,122,79,.10)',t:'#1d6040',b:'rgba(45,122,79,.28)'},APAC:{bg:'rgba(58,130,185,.10)',t:'#2a6080',b:'rgba(58,130,185,.28)'},LATAM:{bg:'rgba(130,80,200,.10)',t:'#5a3598',b:'rgba(130,80,200,.28)'},Global:{bg:'rgba(80,80,80,.08)',t:'#444',b:'rgba(80,80,80,.22)'}};
let yr,mo,entries=JSON.parse(localStorage.getItem('pto_g3')||'null')||[],pD=null,pI=null;
const save=()=>localStorage.setItem('pto_g3',JSON.stringify(entries));
const ds=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const pd=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)};
const wS=d=>{const c=new Date(d);c.setDate(c.getDate()-c.getDay());return c};
const iwk=d=>{const j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7)};
function hoursOn(s){let h=0;const c=pd(s);if(c.getDay()===0||c.getDay()===6)return 0;for(const e of entries){const es=pd(e.s),ee=pd(e.e);if(c>=es&&c<=ee)h+=Number(e.h)}return h}
function wH(ws){let h=0;for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);h+=hoursOn(ds(d))}return h}
function eOn(s){const c=pd(s);return entries.filter(e=>c>=pd(e.s)&&c<=pd(e.e))}
const col=u=>u>=LIM?'var(--grey)':u>=1100?'var(--red)':u>=800?'var(--orange)':'var(--green)';
const lbl=u=>u>=LIM?'LIMIT REACHED':u>=1100?'FEW HOURS LEFT':u>=800?'GETTING FULL':'AVAILABLE';
function getWeeks(){const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0),start=wS(first),weeks=[];let cur=new Date(start);while(true){const days=[];for(let i=0;i<7;i++){days.push(new Date(cur));cur.setDate(cur.getDate()+1)}weeks.push(days);if(cur>last&&weeks.length>=4)break}return weeks}
function render(){
  const weeks=getWeeks(),today=ds(new Date());
  document.getElementById('hm').innerHTML=`Weekly Limit: ${LIM.toLocaleString()} hours<br>${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}`;
  document.getElementById('ml').textContent=MONTHS[mo]+' '+yr;
  document.getElementById('dh').innerHTML=`<div class="dhc">Week</div>`+DAYS.map(d=>`<div class="dhc">${d}</div>`).join('');
  const wh=weeks.map(w=>wH(w[0]));
  const avg=Math.round(wh.reduce((a,b)=>a+b,0)/weeks.length);
  const capped=wh.filter(h=>h>=LIM).length;
  const maxH=Math.max(...wh,0);
  const rem=Math.max(0,LIM-avg);
  document.getElementById('st').innerHTML=`
    <div class="sc"><div class="sl">PTO Entries</div><div class="sv">${entries.length}</div><div class="ss">${weeks.length} weeks visible</div></div>
    <div class="sc"><div class="sl">Avg Hours / Week</div><div class="sv ${avg>=1100?'r':avg>=800?'o':'g'}">${avg.toLocaleString()}<span>h</span></div><div class="ss">of ${LIM.toLocaleString()}h limit</div></div>
    <div class="sc"><div class="sl">Avg Remaining / Week</div><div class="sv">${rem.toLocaleString()}<span>h</span></div><div class="ss">available capacity</div></div>
    <div class="sc"><div class="sl">Weeks at Capacity</div><div class="sv ${capped>0?'r':'g'}">${capped}</div><div class="ss">peak: ${maxH.toLocaleString()}h this month</div></div>`;
  let html='';
  weeks.forEach((days,wi)=>{
    const used=wh[wi],pct=Math.min(100,used/LIM*100),c=col(used),greyed=used>=LIM,wn=iwk(days[1]||days[0]);
    html+=`<div class="wr"><div class="wstripe" style="background:${c}"></div><div class="wl"><div class="wn">WK ${wn}</div><div><div class="wh" style="color:${c}">${used.toLocaleString()}<span>h</span></div><div class="ws2">${lbl(used)}</div><div class="wbw"><div class="wbf" style="width:${pct}%;background:${c}"></div></div></div></div>`;
    days.forEach(d=>{
      const dStr=ds(d),otherM=d.getMonth()!==mo,isToday=dStr===today,de=eOn(dStr),dh=de.reduce((a,e)=>a+Number(e.h),0),dow=d.getDay(),wknd=dow===0||dow===6;
      let cls='dc';if(greyed||wknd)cls+=' grey';if(otherM)cls+=' om';if(isToday)cls+=' td';
      html+=`<div class="${cls}" data-date="${dStr}"><div class="dn">${d.getDate()}</div>`;
      if(dh>0)html+=`<div class="dh2">${dh}h</div>`;
      de.forEach(e=>{const rc=RC[e.r]||RC.Global;html+=`<div class="chip" data-id="${e.id}" style="background:${rc.bg};color:${rc.t};border-color:${rc.b}" title="${e.n} · ${e.h}h/day · ${e.r}">${e.n.split(' ')[0]}</div>`});
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('cb').innerHTML=html;
  document.querySelectorAll('.dc:not(.grey)').forEach(cell=>{
    cell.addEventListener('click',ev=>{if(ev.target.closest('.chip'))return;openModal(cell.dataset.date)});
  });
  document.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click',ev=>{ev.stopPropagation();showCtx(ev,null,chip.dataset.id)});
  });
}
function openModal(date){
  pD=date;pI=null;
  document.getElementById('fsd').value=date;
  document.getElementById('fed').value=date;
  document.getElementById('fn').value='';
  document.getElementById('fhd').value=8;
  document.getElementById('frd').value='AMER';
  const ws=wS(pd(date)),used=wH(ws),rem=LIM-used,wb=document.getElementById('wb');
  wb.className='warn';
  if(rem<=0){wb.style.display='block';wb.classList.add('d');wb.textContent=`LIMIT REACHED — ${used.toLocaleString()}/${LIM.toLocaleString()} hours used this week`}
  else if(rem<=200){wb.style.display='block';wb.textContent=`Only ${rem.toLocaleString()} hours remaining this week (${used.toLocaleString()}h used)`}
  else wb.style.display='none';
  document.getElementById('ov').classList.add('open');
  setTimeout(()=>document.getElementById('fn').focus(),80);
}
const closeModal=()=>{document.getElementById('ov').classList.remove('open');pD=pI=null};
document.getElementById('mc').addEventListener('click',closeModal);
document.getElementById('mca').addEventListener('click',closeModal);
document.getElementById('ov').addEventListener('click',ev=>{if(ev.target===document.getElementById('ov'))closeModal()});
document.getElementById('msv').addEventListener('click',()=>{
  const n=document.getElementById('fn').value.trim(),s=document.getElementById('fsd').value,e=document.getElementById('fed').value,h=parseFloat(document.getElementById('fhd').value),r=document.getElementById('frd').value;
  if(!n||!s||!e||isNaN(h)){alert('Please complete all fields.');return}
  if(e<s){alert('End date must be on or after start date.');return}
  entries.push({id:Date.now().toString(),n,s,e,h,r});save();closeModal();render();
});
function showCtx(ev,date,chipId){
  ev.stopPropagation();const menu=document.getElementById('ctx');
  pD=date;pI=chipId;
  document.getElementById('ca').style.display=date?'block':'none';
  document.getElementById('cd').style.display=chipId?'block':'none';
  menu.style.left=Math.min(ev.clientX,innerWidth-160)+'px';
  menu.style.top=Math.min(ev.clientY,innerHeight-80)+'px';
  menu.classList.add('open');
}
document.getElementById('ca').addEventListener('click',()=>{document.getElementById('ctx').classList.remove('open');if(pD)openModal(pD)});
document.getElementById('cd').addEventListener('click',()=>{document.getElementById('ctx').classList.remove('open');if(pI){entries=entries.filter(e=>e.id!==pI);save();render()}});
document.addEventListener('click',()=>document.getElementById('ctx').classList.remove('open'));
document.getElementById('pb').addEventListener('click',()=>{mo--;if(mo<0){mo=11;yr--}render()});
document.getElementById('nb').addEventListener('click',()=>{mo++;if(mo>11){mo=0;yr++}render()});
document.getElementById('tb').addEventListener('click',()=>{const n=new Date();yr=n.getFullYear();mo=n.getMonth();render()});
function seed(){
  const y=new Date().getFullYear(),m=String(new Date().getMonth()+1).padStart(2,'0');
  entries=[
    {id:'1',n:'Sarah Johnson',s:`${y}-${m}-03`,e:`${y}-${m}-07`,h:8,r:'AMER'},
    {id:'2',n:'Luca Ferretti',s:`${y}-${m}-03`,e:`${y}-${m}-05`,h:8,r:'EMEA'},
    {id:'3',n:'Aiko Tanaka',s:`${y}-${m}-10`,e:`${y}-${m}-14`,h:8,r:'APAC'},
    {id:'4',n:'Marco Silva',s:`${y}-${m}-10`,e:`${y}-${m}-12`,h:8,r:'LATAM'},
    {id:'5',n:'Elena Popov',s:`${y}-${m}-17`,e:`${y}-${m}-21`,h:8,r:'EMEA'},
    {id:'6',n:'David Chen',s:`${y}-${m}-17`,e:`${y}-${m}-19`,h:8,r:'APAC'},
    {id:'7',n:'Amy Rivera',s:`${y}-${m}-17`,e:`${y}-${m}-21`,h:8,r:'AMER'},
    {id:'8',n:'Tom Bailey',s:`${y}-${m}-17`,e:`${y}-${m}-21`,h:8,r:'AMER'},
    {id:'9',n:'Nina Schmidt',s:`${y}-${m}-17`,e:`${y}-${m}-21`,h:8,r:'EMEA'},
  ];save();
}
const n=new Date();yr=n.getFullYear();mo=n.getMonth();
if(!entries.length)seed();
render();
</script>
</body>
</html>
